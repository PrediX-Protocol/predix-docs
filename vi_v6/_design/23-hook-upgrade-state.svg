<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 340" font-family="Inter, system-ui, sans-serif">
  <rect x="0" y="0" width="740" height="340" rx="12" fill="#ffffff"/>
  <g transform="translate(30,30)">

  <style>
    .t { font-size: 14px; font-weight: 600; }
    .s { font-size: 12px; }
    .arr { stroke: #64748b; stroke-width: 1.5; }
    .lbl { font-size: 11px; fill: #94a3b8; }
  </style>
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <!-- Initial -->
  <circle cx="50" cy="80" r="8" fill="#0f172a"/>
  <line x1="58" y1="80" x2="88" y2="80" class="arr" marker-end="url(#a)"/>

  <!-- Idle -->
  <rect x="90" y="52" width="110" height="52" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text class="t" fill="#334155" x="145" y="72" text-anchor="middle">Idle</text>
  <text class="s" fill="#64748b" x="145" y="90" text-anchor="middle">No upgrade</text>

  <line x1="200" y1="78" x2="248" y2="78" class="arr" marker-end="url(#a)"/>
  <text class="lbl" x="224" y="70" text-anchor="middle">propose()</text>

  <!-- Proposed -->
  <rect x="250" y="52" width="130" height="52" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text class="t" fill="#92400e" x="315" y="72" text-anchor="middle">Proposed</text>
  <text class="s" fill="#64748b" x="315" y="90" text-anchor="middle">48h timelock</text>

  <!-- Executed (down-right) -->
  <line x1="380" y1="78" x2="450" y2="78" class="arr" marker-end="url(#a)"/>
  <text class="lbl" x="415" y="70" text-anchor="middle">48h passed</text>

  <rect x="452" y="52" width="130" height="52" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text class="t" fill="#15803d" x="517" y="72" text-anchor="middle">Executed</text>
  <text class="s" fill="#64748b" x="517" y="90" text-anchor="middle">New hook active</text>

  <!-- Final -->
  <circle cx="517" cy="140" r="10" fill="none" stroke="#0f172a" stroke-width="1.5"/>
  <circle cx="517" cy="140" r="5" fill="#0f172a"/>
  <line x1="517" y1="104" x2="517" y2="130" class="arr" marker-end="url(#a)"/>

  <!-- Cancelled (down) -->
  <line x1="315" y1="104" x2="315" y2="180" class="arr" marker-end="url(#a)"/>
  <text class="lbl" x="330" y="146" text-anchor="start">cancel()</text>

  <rect x="250" y="180" width="130" height="52" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text class="t" fill="#991b1b" x="315" y="200" text-anchor="middle">Cancelled</text>
  <text class="s" fill="#64748b" x="315" y="218" text-anchor="middle">Back to idle</text>

  <!-- Back to idle -->
  <path d="M250 206 L145 206 L145 104" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#a)"/>

  </g>
</svg>
