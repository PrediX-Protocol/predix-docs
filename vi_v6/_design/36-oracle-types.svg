<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" font-family="Inter, system-ui, sans-serif">
  <rect x="0" y="0" width="800" height="240" rx="12" fill="#ffffff"/>

  <!-- Decision diamond -->
  <polygon points="400,12 480,48 400,84 320,48" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="400" y="50" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#92400e">Event type?</text>

  <!-- Arrows from diamond to boxes -->
  <line x1="340" y1="65" x2="140" y2="110" stroke="#64748b" stroke-width="1.5"/>
  <line x1="400" y1="84" x2="400" y2="110" stroke="#64748b" stroke-width="1.5"/>
  <line x1="460" y1="65" x2="660" y2="110" stroke="#64748b" stroke-width="1.5"/>

  <!-- Labels on arrows -->
  <text x="220" y="82" text-anchor="middle" font-size="11" fill="#64748b">Price threshold</text>
  <text x="400" y="100" text-anchor="middle" font-size="11" fill="#64748b">Subjective event</text>
  <text x="580" y="82" text-anchor="middle" font-size="11" fill="#64748b">Decentralized</text>

  <!-- ChainlinkOracle box (left) -->
  <rect x="30" y="110" width="220" height="56" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="140" y="132" text-anchor="middle" font-size="14" font-weight="600" fill="#15803d">ChainlinkOracle</text>
  <text x="140" y="150" text-anchor="middle" font-size="12" fill="#64748b">Price feed, auto, permissionless</text>

  <!-- ManualOracle box (center) -->
  <rect x="290" y="110" width="220" height="56" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="400" y="132" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">ManualOracle</text>
  <text x="400" y="150" text-anchor="middle" font-size="12" fill="#64748b">Multisig 3/5</text>

  <!-- UMAOracle box (right) -->
  <rect x="550" y="110" width="220" height="56" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="660" y="132" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">UMAOracle</text>
  <text x="660" y="150" text-anchor="middle" font-size="12" fill="#64748b">48h dispute window · Phase 2</text>

  <!-- Subtitle -->
  <text x="400" y="200" text-anchor="middle" font-size="11" fill="#94a3b8">Committee oracle (Phase 3) — t-of-N threshold, cross-chain</text>
</svg>
