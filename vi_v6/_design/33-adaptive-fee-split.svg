<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 340" font-family="Inter, system-ui, sans-serif">
  <rect x="0" y="0" width="740" height="340" rx="12" fill="#ffffff"/>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Source: Protocol fee -->
  <rect x="40" y="120" width="160" height="56" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="120" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">Protocol fee</text>
  <text x="120" y="160" text-anchor="middle" font-size="12" fill="#64748b">All sources</text>

  <!-- Arrow source → split -->
  <line x1="200" y1="148" x2="250" y2="148" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Center: Adaptive split -->
  <rect x="260" y="120" width="160" height="56" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="340" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#5b21b6">Adaptive split</text>
  <text x="340" y="160" text-anchor="middle" font-size="12" fill="#64748b">Phase-based</text>

  <!-- Vertical line from center to fan-out -->
  <line x1="420" y1="148" x2="450" y2="148" stroke="#64748b" stroke-width="1.5"/>
  <line x1="450" y1="40" x2="450" y2="260" stroke="#64748b" stroke-width="1.5"/>

  <!-- Arrow → Treasury -->
  <line x1="450" y1="40" x2="490" y2="40" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="500" y="14" width="200" height="52" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="600" y="34" text-anchor="middle" font-size="14" font-weight="600" fill="#92400e">Treasury</text>
  <text x="600" y="52" text-anchor="middle" font-size="12" fill="#64748b">15–60%</text>

  <!-- Arrow → Staker -->
  <line x1="450" y1="112" x2="490" y2="112" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="500" y="86" width="200" height="52" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="600" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">Staker yield</text>
  <text x="600" y="124" text-anchor="middle" font-size="12" fill="#64748b">20–35% USDC</text>

  <!-- Arrow → Buyback -->
  <line x1="450" y1="184" x2="490" y2="184" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="500" y="158" width="200" height="52" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="600" y="178" text-anchor="middle" font-size="14" font-weight="600" fill="#991b1b">Buyback-burn</text>
  <text x="600" y="196" text-anchor="middle" font-size="12" fill="#64748b">15–50% PRX</text>

  <!-- Arrow → Insurance -->
  <line x1="450" y1="256" x2="490" y2="256" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="500" y="230" width="200" height="52" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="600" y="250" text-anchor="middle" font-size="14" font-weight="600" fill="#15803d">Insurance fund</text>
  <text x="600" y="268" text-anchor="middle" font-size="12" fill="#64748b">5% fixed</text>

</svg>
