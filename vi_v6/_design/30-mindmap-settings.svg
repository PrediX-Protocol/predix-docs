<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="Inter, system-ui, sans-serif">
  <rect x="0" y="0" width="900" height="440" rx="12" fill="#ffffff"/>

  <style>
    .center { font-size: 18px; font-weight: 700; fill: #334155; }
    .l1 { font-size: 14px; font-weight: 600; }
    .l2 { font-size: 11px; font-weight: 500; fill: #334155; }
    .branch { fill: none; stroke-width: 2; stroke-linecap: round; }
    .twig { fill: none; stroke-width: 1.2; stroke-linecap: round; }
    .leaf { fill: #f1f5f9; stroke: #e2e8f0; stroke-width: 1; }
  </style>

  <!-- Center -->
  <rect x="365" y="170" width="170" height="48" rx="24" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text class="center" x="450" y="200" text-anchor="middle">Settings</text>

  <!-- Profile (top-left) -->
  <path class="branch" stroke="#2563eb" d="M365 178 C320 155, 260 135, 210 115"/>
  <rect x="140" y="92" width="130" height="36" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text class="l1" fill="#1e40af" x="205" y="115" text-anchor="middle">Profile</text>
  <path class="twig" stroke="#93c5fd" d="M165 92 Q145 68, 125 54"/>
  <rect x="50" y="36" width="108" height="26" rx="6" class="leaf"/><text class="l2" x="104" y="54" text-anchor="middle">Display name</text>
  <path class="twig" stroke="#93c5fd" d="M240 92 Q260 68, 278 54"/>
  <rect x="244" y="36" width="72" height="26" rx="6" class="leaf"/><text class="l2" x="280" y="54" text-anchor="middle">Avatar</text>

  <!-- Trading (top-right) -->
  <path class="branch" stroke="#0d9488" d="M535 178 C580 155, 640 135, 690 115"/>
  <rect x="630" y="92" width="130" height="36" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <text class="l1" fill="#134e4a" x="695" y="115" text-anchor="middle">Trading</text>
  <path class="twig" stroke="#5eead4" d="M660 92 Q640 68, 618 54"/>
  <rect x="548" y="36" width="120" height="26" rx="6" class="leaf"/><text class="l2" x="608" y="54" text-anchor="middle">Default slippage</text>
  <path class="twig" stroke="#5eead4" d="M730 92 Q750 68, 770 54"/>
  <rect x="726" y="36" width="104" height="26" rx="6" class="leaf"/><text class="l2" x="778" y="54" text-anchor="middle">Gas priority</text>

  <!-- Notifications (bottom-left) -->
  <path class="branch" stroke="#d97706" d="M365 212 C290 245, 190 275, 140 300"/>
  <rect x="50" y="290" width="160" height="36" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text class="l1" fill="#92400e" x="130" y="313" text-anchor="middle">Notifications</text>
  <path class="twig" stroke="#fbbf24" d="M80 326 Q55 350, 35 364"/>
  <rect x="10" y="356" width="104" height="26" rx="6" class="leaf"/><text class="l2" x="62" y="374" text-anchor="middle">Market alerts</text>
  <path class="twig" stroke="#fbbf24" d="M180 326 Q210 350, 240 364"/>
  <rect x="175" y="356" width="140" height="26" rx="6" class="leaf"/><text class="l2" x="245" y="374" text-anchor="middle">Resolution updates</text>

  <!-- Developer (bottom-center) -->
  <path class="branch" stroke="#8b5cf6" d="M450 218 Q450 268, 450 286"/>
  <rect x="385" y="282" width="130" height="36" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text class="l1" fill="#5b21b6" x="450" y="305" text-anchor="middle">Developer</text>
  <path class="twig" stroke="#c4b5fd" d="M410 318 Q378 342, 348 356"/>
  <rect x="296" y="348" width="96" height="26" rx="6" class="leaf"/><text class="l2" x="344" y="366" text-anchor="middle">API keys</text>
  <path class="twig" stroke="#c4b5fd" d="M450 318 Q450 342, 450 356"/>
  <rect x="396" y="348" width="108" height="26" rx="6" class="leaf"/><text class="l2" x="450" y="366" text-anchor="middle">Webhook URLs</text>
  <path class="twig" stroke="#c4b5fd" d="M490 318 Q522 342, 554 356"/>
  <rect x="510" y="348" width="112" height="26" rx="6" class="leaf"/><text class="l2" x="566" y="366" text-anchor="middle">Testnet toggle</text>

  <!-- Privacy (bottom-right) -->
  <path class="branch" stroke="#dc2626" d="M535 212 C610 245, 710 275, 760 300"/>
  <rect x="700" y="290" width="130" height="36" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text class="l1" fill="#991b1b" x="765" y="313" text-anchor="middle">Privacy</text>
  <path class="twig" stroke="#fca5a5" d="M730 326 Q705 350, 680 364"/>
  <rect x="622" y="356" width="116" height="26" rx="6" class="leaf"/><text class="l2" x="680" y="374" text-anchor="middle">Hide portfolio</text>
  <path class="twig" stroke="#fca5a5" d="M800 326 Q820 350, 838 364"/>
  <rect x="802" y="356" width="84" height="26" rx="6" class="leaf"/><text class="l2" x="844" y="366" text-anchor="middle">Anon</text>

</svg>
