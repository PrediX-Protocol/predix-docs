<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" font-family="Inter, system-ui, sans-serif">
  <style>
    .center { font-size: 16px; font-weight: 700; fill: #334155; }
    .l1 { font-size: 13px; font-weight: 600; }
    .l2 { font-size: 11px; fill: #64748b; }
    .branch { fill: none; stroke-width: 2; stroke-linecap: round; }
    .twig { fill: none; stroke-width: 1.2; stroke-linecap: round; }
  </style>

  <rect x="272" y="216" width="136" height="48" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="center" x="340" y="244" text-anchor="middle">Settings</text>

  <!-- Profile (top-left) -->
  <path class="branch" stroke="#2563eb" d="M282 228 Q170 210 90 140"/>
  <rect x="30" y="106" width="110" height="36" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text class="l1" fill="#1e40af" x="85" y="129" text-anchor="middle">Profile</text>
  <path class="twig" stroke="#93c5fd" d="M45 106 Q35 86 25 70"/><text class="l2" x="21" y="64" text-anchor="end">Display name</text>
  <path class="twig" stroke="#93c5fd" d="M115 106 Q125 86 140 70"/><text class="l2" x="142" y="64" text-anchor="start">Avatar</text>

  <!-- Trading (top-right) -->
  <path class="branch" stroke="#0d9488" d="M398 228 Q510 210 580 140"/>
  <rect x="520" y="106" width="120" height="36" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="1"/>
  <text class="l1" fill="#134e4a" x="580" y="129" text-anchor="middle">Trading</text>
  <path class="twig" stroke="#5eead4" d="M540 106 Q530 86 515 70"/><text class="l2" x="513" y="64" text-anchor="end">Default slippage</text>
  <path class="twig" stroke="#5eead4" d="M620 106 Q630 86 645 70"/><text class="l2" x="647" y="64" text-anchor="start">Gas priority</text>

  <!-- Notifications (left) -->
  <path class="branch" stroke="#d97706" d="M282 248 Q170 270 80 300"/>
  <rect x="20" y="290" width="130" height="36" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text class="l1" fill="#92400e" x="85" y="313" text-anchor="middle">Notifications</text>
  <path class="twig" stroke="#fbbf24" d="M35 326 Q25 345 15 358"/><text class="l2" x="11" y="372" text-anchor="end">Market alerts</text>
  <path class="twig" stroke="#fbbf24" d="M115 326 Q125 345 140 358"/><text class="l2" x="142" y="372" text-anchor="start">Resolution updates</text>

  <!-- Privacy (right) -->
  <path class="branch" stroke="#dc2626" d="M398 248 Q510 270 590 300"/>
  <rect x="530" y="290" width="110" height="36" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text class="l1" fill="#991b1b" x="585" y="313" text-anchor="middle">Privacy</text>
  <path class="twig" stroke="#fca5a5" d="M545 326 Q535 345 520 358"/><text class="l2" x="518" y="372" text-anchor="end">Hide portfolio</text>
  <path class="twig" stroke="#fca5a5" d="M620 326 Q630 345 645 358"/><text class="l2" x="647" y="372" text-anchor="start">Anonymous mode</text>

  <!-- Developer (bottom) -->
  <path class="branch" stroke="#8b5cf6" d="M340 264 Q340 360 340 390"/>
  <rect x="275" y="390" width="130" height="36" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text class="l1" fill="#5b21b6" x="340" y="413" text-anchor="middle">Developer</text>
  <path class="twig" stroke="#c4b5fd" d="M290 426 Q275 445 255 458"/><text class="l2" x="253" y="472" text-anchor="end">API keys</text>
  <path class="twig" stroke="#c4b5fd" d="M340 426 Q340 445 340 458"/><text class="l2" x="340" y="472" text-anchor="middle">Webhook URLs</text>
  <path class="twig" stroke="#c4b5fd" d="M390 426 Q405 445 425 458"/><text class="l2" x="427" y="472" text-anchor="start">Testnet toggle</text>
</svg>
