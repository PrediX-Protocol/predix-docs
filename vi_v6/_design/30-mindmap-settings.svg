<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif">
  <rect x="0" y="0" width="900" height="520" rx="12" fill="#ffffff"/>

  <style>
    .center { font-size: 18px; font-weight: 700; fill: #334155; }
    .l1 { font-size: 14px; font-weight: 600; }
    .l2 { font-size: 11px; font-weight: 500; fill: #334155; }
    .branch { fill: none; stroke-width: 2.5; stroke-linecap: round; }
    .twig { fill: none; stroke-width: 1.5; stroke-linecap: round; }
    .leaf { fill: #f1f5f9; stroke: #e2e8f0; stroke-width: 1; }
  </style>

  <!-- Center: edges L=365 R=535 T=196 B=248 -->
  <rect x="365" y="196" width="170" height="52" rx="26" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text class="center" x="450" y="228" text-anchor="middle">Settings</text>

  <!-- Profile (top-left) -->
  <path class="branch" stroke="#2563eb" d="M365 204 C260 170, 180 140, 130 110"/>
  <rect x="60" y="86" width="130" height="40" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text class="l1" fill="#1e40af" x="125" y="111" text-anchor="middle">Profile</text>
  <path class="twig" stroke="#93c5fd" d="M85 86 Q65 62, 48 46"/>
  <rect x="4" y="28" width="108" height="26" rx="6" class="leaf"/><text class="l2" x="58" y="46" text-anchor="middle">Display name</text>
  <path class="twig" stroke="#93c5fd" d="M160 86 Q180 62, 200 46"/>
  <rect x="166" y="28" width="72" height="26" rx="6" class="leaf"/><text class="l2" x="202" y="46" text-anchor="middle">Avatar</text>

  <!-- Trading (top-right) -->
  <path class="branch" stroke="#0d9488" d="M535 204 C640 170, 720 140, 770 110"/>
  <rect x="710" y="86" width="130" height="40" rx="10" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <text class="l1" fill="#134e4a" x="775" y="111" text-anchor="middle">Trading</text>
  <path class="twig" stroke="#5eead4" d="M740 86 Q720 62, 695 46"/>
  <rect x="630" y="28" width="120" height="26" rx="6" class="leaf"/><text class="l2" x="690" y="46" text-anchor="middle">Default slippage</text>
  <path class="twig" stroke="#5eead4" d="M810 86 Q830 62, 850 46"/>
  <rect x="802" y="28" width="96" height="26" rx="6" class="leaf"/><text class="l2" x="850" y="46" text-anchor="middle">Gas priority</text>

  <!-- Notifications (bottom-left) — far left -->
  <path class="branch" stroke="#d97706" d="M365 242 C230 290, 120 330, 80 360"/>
  <rect x="10" y="348" width="160" height="40" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text class="l1" fill="#92400e" x="90" y="373" text-anchor="middle">Notifications</text>
  <path class="twig" stroke="#fbbf24" d="M40 388 Q20 414, 8 430"/>
  <rect x="4" y="424" width="104" height="26" rx="6" class="leaf"/><text class="l2" x="56" y="442" text-anchor="middle">Market alerts</text>
  <path class="twig" stroke="#fbbf24" d="M140 388 Q165 414, 195 430"/>
  <rect x="130" y="424" width="140" height="26" rx="6" class="leaf"/><text class="l2" x="200" y="442" text-anchor="middle">Resolution updates</text>

  <!-- Developer (bottom-center) -->
  <path class="branch" stroke="#8b5cf6" d="M450 248 Q450 350, 450 370"/>
  <rect x="385" y="368" width="130" height="40" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text class="l1" fill="#5b21b6" x="450" y="393" text-anchor="middle">Developer</text>
  <path class="twig" stroke="#c4b5fd" d="M410 408 Q375 434, 340 448"/>
  <rect x="288" y="440" width="96" height="26" rx="6" class="leaf"/><text class="l2" x="336" y="458" text-anchor="middle">API keys</text>
  <path class="twig" stroke="#c4b5fd" d="M450 408 Q450 434, 450 448"/>
  <rect x="396" y="440" width="108" height="26" rx="6" class="leaf"/><text class="l2" x="450" y="458" text-anchor="middle">Webhook URLs</text>
  <path class="twig" stroke="#c4b5fd" d="M490 408 Q525 434, 560 448"/>
  <rect x="510" y="440" width="112" height="26" rx="6" class="leaf"/><text class="l2" x="566" y="458" text-anchor="middle">Testnet toggle</text>

  <!-- Privacy (bottom-right) — far right -->
  <path class="branch" stroke="#dc2626" d="M535 242 C670 290, 780 330, 820 360"/>
  <rect x="760" y="348" width="130" height="40" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text class="l1" fill="#991b1b" x="825" y="373" text-anchor="middle">Privacy</text>
  <path class="twig" stroke="#fca5a5" d="M790 388 Q765 414, 740 430"/>
  <rect x="684" y="424" width="116" height="26" rx="6" class="leaf"/><text class="l2" x="742" y="442" text-anchor="middle">Hide portfolio</text>
  <path class="twig" stroke="#fca5a5" d="M860 388 Q878 414, 870 430"/>
  <rect x="830" y="424" width="68" height="26" rx="6" class="leaf"/><text class="l2" x="864" y="442" text-anchor="middle">Anon</text>

</svg>
