<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" font-family="Inter, system-ui, sans-serif">
  <style>
    .t { font-size: 14px; font-weight: 600; }
    .s { font-size: 12px; }
    .lbl { font-size: 11px; fill: #94a3b8; }
    .arr { stroke: #64748b; stroke-width: 1.5; }
  </style>
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <!-- Initial -->
  <circle cx="60" cy="90" r="8" fill="#0f172a"/>
  <line x1="68" y1="90" x2="100" y2="90" class="arr" marker-end="url(#a)"/>

  <rect x="100" y="62" width="120" height="52" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text class="t" fill="#15803d" x="160" y="82" text-anchor="middle">Active</text>
  <text class="s" fill="#64748b" x="160" y="100" text-anchor="middle">Trading open</text>

  <line x1="220" y1="88" x2="268" y2="88" class="arr" marker-end="url(#a)"/>
  <text class="lbl" x="244" y="80" text-anchor="middle">endTime</text>

  <rect x="270" y="62" width="120" height="52" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text class="t" fill="#92400e" x="330" y="82" text-anchor="middle">Ended</text>
  <text class="s" fill="#64748b" x="330" y="100" text-anchor="middle">Awaiting oracle</text>

  <line x1="390" y1="88" x2="438" y2="88" class="arr" marker-end="url(#a)"/>
  <text class="lbl" x="414" y="80" text-anchor="middle">Report</text>

  <rect x="440" y="62" width="130" height="52" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text class="t" fill="#5b21b6" x="505" y="82" text-anchor="middle">Resolving</text>
  <text class="s" fill="#64748b" x="505" y="100" text-anchor="middle">Challenge window</text>

  <line x1="505" y1="114" x2="505" y2="186" class="arr" marker-end="url(#a)"/>
  <text class="lbl" x="520" y="154" text-anchor="start">Finalized</text>

  <rect x="440" y="188" width="130" height="52" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="1"/>
  <text class="t" fill="#134e4a" x="505" y="208" text-anchor="middle">Resolved</text>
  <text class="s" fill="#64748b" x="505" y="226" text-anchor="middle">Redeemable</text>

  <!-- Final -->
  <circle cx="505" cy="274" r="10" fill="none" stroke="#0f172a" stroke-width="1.5"/>
  <circle cx="505" cy="274" r="5" fill="#0f172a"/>
  <line x1="505" y1="240" x2="505" y2="264" class="arr" marker-end="url(#a)"/>

  <!-- Emergency -->
  <line x1="330" y1="114" x2="330" y2="280" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#a)"/>
  <text class="lbl" x="345" y="200" fill="#dc2626">Emergency</text>

  <rect x="230" y="282" width="200" height="52" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text class="t" fill="#991b1b" x="330" y="302" text-anchor="middle">Refund mode</text>
  <text class="s" fill="#64748b" x="330" y="320" text-anchor="middle">Burn YES+NO → USDC</text>
</svg>
