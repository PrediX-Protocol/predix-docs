<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" font-family="Inter, system-ui, sans-serif">
  <style>
    .t { font-size: 14px; font-weight: 600; }
    .s { font-size: 11px; fill: #94a3b8; }
    .item { font-size: 12px; fill: #334155; }
    .check { font-size: 12px; fill: #16a34a; font-weight: 600; }
    .cross { font-size: 12px; fill: #dc2626; font-weight: 600; }
    .badge { font-size: 11px; font-weight: 600; fill: #1e40af; }
  </style>

  <!-- CLOB -->
  <rect x="20" y="20" width="200" height="320" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text class="t" fill="#0f172a" x="120" y="48" text-anchor="middle">CLOB only</text>
  <text class="s" x="120" y="66" text-anchor="middle">Central limit order book</text>
  <line x1="40" y1="80" x2="200" y2="80" stroke="#e2e8f0" stroke-width="0.5"/>
  <text class="check" x="40" y="108">✓</text><text class="item" x="58" y="108">Best price large orders</text>
  <text class="check" x="40" y="134">✓</text><text class="item" x="58" y="134">Zero slippage (limit)</text>
  <text class="cross" x="40" y="168">✗</text><text class="item" x="58" y="168">Needs market makers</text>
  <text class="cross" x="40" y="194">✗</text><text class="item" x="58" y="194">No long-tail liquidity</text>
  <text class="cross" x="40" y="220">✗</text><text class="item" x="58" y="220">Partial fills common</text>

  <!-- AMM -->
  <rect x="240" y="20" width="200" height="320" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text class="t" fill="#0f172a" x="340" y="48" text-anchor="middle">AMM only</text>
  <text class="s" x="340" y="66" text-anchor="middle">Automated market maker</text>
  <line x1="260" y1="80" x2="420" y2="80" stroke="#e2e8f0" stroke-width="0.5"/>
  <text class="check" x="260" y="108">✓</text><text class="item" x="278" y="108">Always-on liquidity</text>
  <text class="check" x="260" y="134">✓</text><text class="item" x="278" y="134">Permissionless LP</text>
  <text class="cross" x="260" y="168">✗</text><text class="item" x="278" y="168">Slippage on large trades</text>
  <text class="cross" x="260" y="194">✗</text><text class="item" x="278" y="194">Impermanent loss risk</text>
  <text class="cross" x="260" y="220">✗</text><text class="item" x="278" y="220">MEV vulnerable</text>

  <!-- Hybrid (highlighted) -->
  <rect x="460" y="20" width="200" height="320" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <rect x="490" y="10" width="60" height="20" rx="10" fill="#dbeafe"/>
  <text class="badge" x="520" y="24" text-anchor="middle">PrediX</text>
  <text class="t" fill="#0f172a" x="560" y="48" text-anchor="middle">Hybrid router</text>
  <text class="s" x="560" y="66" text-anchor="middle">CLOB + AMM fallback</text>
  <line x1="480" y1="80" x2="640" y2="80" stroke="#bfdbfe" stroke-width="0.5"/>
  <text class="check" x="480" y="108">✓</text><text class="item" x="498" y="108">Best price via CLOB</text>
  <text class="check" x="480" y="134">✓</text><text class="item" x="498" y="134">AMM guarantees fill</text>
  <text class="check" x="480" y="160">✓</text><text class="item" x="498" y="160">Single-tx execution</text>
  <text class="check" x="480" y="186">✓</text><text class="item" x="498" y="186">Revert protection</text>
  <text class="check" x="480" y="212">✓</text><text class="item" x="498" y="212">Works for all markets</text>
</svg>
